name: Actualizar datos SUACI

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install pandas requests duckdb tqdm

      - name: Correr pipeline
        run: python pipeline_v2.py --export

      - name: Commitear data.js
        run: |
          git config user.name "Termómetro Bot"
          git config user.email "bot@termometro-barrio"
          git add data.js
          git diff --staged --quiet || git commit -m "datos actualizados $(date +'%Y-%m-%d')"
          git push
